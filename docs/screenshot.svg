  <text x="520" y="111" fill="#D8E7F2" font-size="20" font-family="Menlo, Monaco, Consolas, monospace">anthropic-rs</text>

  <rect x="110" y="164" width="458" height="430" rx="22" fill="#0B1724" stroke="#193244"/>
  <rect x="596" y="164" width="494" height="430" rx="22" fill="#081521" stroke="#193244"/>
  <rect x="110" y="164" width="458" height="430" rx="22" fill="url(#glow)"/>

  <text x="136" y="205" fill="#8CCBFF" font-size="16" font-family="Menlo, Monaco, Consolas, monospace">request.rs</text>
  <text x="624" y="205" fill="#90E0C1" font-size="16" font-family="Menlo, Monaco, Consolas, monospace">stream output</text>

  <text x="136" y="246" fill="#6EE7B7" font-size="18" font-family="Menlo, Monaco, Consolas, monospace">let client = Client::from_env()?;</text>
  <text x="136" y="280" fill="#C9D8E6" font-size="18" font-family="Menlo, Monaco, Consolas, monospace">let request = MessagesRequestBuilder::new(</text>
  <text x="160" y="312" fill="#93C5FD" font-size="18" font-family="Menlo, Monaco, Consolas, monospace">"claude-3-5-sonnet-20240620",</text>
  <text x="160" y="344" fill="#C9D8E6" font-size="18" font-family="Menlo, Monaco, Consolas, monospace">vec![Message {</text>
  <text x="184" y="376" fill="#C9D8E6" font-size="18" font-family="Menlo, Monaco, Consolas, monospace">role: Role::User,</text>
  <text x="184" y="408" fill="#C9D8E6" font-size="18" font-family="Menlo, Monaco, Consolas, monospace">content: vec![ContentBlock::text(...)]</text>
  <text x="160" y="440" fill="#C9D8E6" font-size="18" font-family="Menlo, Monaco, Consolas, monospace">}], 256)</text>
  <text x="136" y="472" fill="#F9A8D4" font-size="18" font-family="Menlo, Monaco, Consolas, monospace">.tools(...)</text>
  <text x="136" y="504" fill="#FDE68A" font-size="18" font-family="Menlo, Monaco, Consolas, monospace">.build()?;</text>
  <text x="136" y="548" fill="#C9D8E6" font-size="16" font-family="Menlo, Monaco, Consolas, monospace">POST /v1/messages or stream=true SSE</text>

  <text x="624" y="246" fill="#A7F3D0" font-size="18" font-family="Menlo, Monaco, Consolas, monospace">messages response:</text>
  <text x="624" y="282" fill="#E2E8F0" font-size="18" font-family="Menlo, Monaco, Consolas, monospace">id: "msg_..."</text>
  <text x="624" y="314" fill="#E2E8F0" font-size="18" font-family="Menlo, Monaco, Consolas, monospace">role: Assistant</text>
  <text x="624" y="346" fill="#7DD3FC" font-size="18" font-family="Menlo, Monaco, Consolas, monospace">content[0].text = "Hello from Claude"</text>
  <text x="624" y="392" fill="#A7F3D0" font-size="18" font-family="Menlo, Monaco, Consolas, monospace">stream events:</text>
  <text x="648" y="424" fill="#E2E8F0" font-size="18" font-family="Menlo, Monaco, Consolas, monospace">message_start</text>
  <text x="648" y="456" fill="#E2E8F0" font-size="18" font-family="Menlo, Monaco, Consolas, monospace">content_block_start</text>
  <text x="648" y="488" fill="#7DD3FC" font-size="18" font-family="Menlo, Monaco, Consolas, monospace">text_delta: "Hello "</text>
  <text x="648" y="520" fill="#7DD3FC" font-size="18" font-family="Menlo, Monaco, Consolas, monospace">text_delta: "world"</text>
  <text x="648" y="552" fill="#E2E8F0" font-size="18" font-family="Menlo, Monaco, Consolas, monospace">message_stop</text>

  <rect x="110" y="620" width="204" height="36" rx="18" fill="#103124" stroke="#23543B"/>
  <rect x="328" y="620" width="194" height="36" rx="18" fill="#12293C" stroke="#244C66"/>
  <rect x="536" y="620" width="198" height="36" rx="18" fill="#341B2A" stroke="#64304C"/>

  <text x="138" y="644" fill="#9AE6B4" font-size="16" font-family="Menlo, Monaco, Consolas, monospace">typed builders</text>
  <text x="356" y="644" fill="#93C5FD" font-size="16" font-family="Menlo, Monaco, Consolas, monospace">SSE streaming</text>
  <text x="564" y="644" fill="#F9A8D4" font-size="16" font-family="Menlo, Monaco, Consolas, monospace">tool-use payloads</text>
